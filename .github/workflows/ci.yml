name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    # 依赖 build-frontend：web/embed.go 用 //go:embed all:dist 嵌入前端
    # 构建产物，typecheck 阶段要求 web/dist 必须存在。不依赖则 lint 会报
    # "pattern all:dist: no matching files found"。
    needs: build-frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ubuntu-latest
    # 同样依赖 build-frontend：test 包含 cmd/jetlinks-edge 与 internal/web
    # 包，它们 import web.DistFS，go test 阶段也要 typecheck web/embed.go。
    needs: [build-frontend, lint]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.out

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: web/package.json
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
