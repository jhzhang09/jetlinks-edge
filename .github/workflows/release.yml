name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # 验证：确保打 tag 的 main 已经过 lint、race test、frontend build
  # release job 强依赖此 job，verify 失败则不发版
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          # 读 web/package.json 的 engines.node 字段（当前 ">=18"），
          # 自动选择满足约束的最新 LTS Node 版本。
          # 与 setup-go 读 go.mod 同样的"单一来源"模式，避免硬编码脱节。
          node-version-file: web/package.json
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: v2.12.2

      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

  release:
    name: Build & Release
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v6
        with:
          node-version-file: web/package.json
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Build all platforms
        env:
          VERSION: ${{ github.ref_name }}
        run: bash scripts/build-bundle.sh --all

      - name: Generate checksums
        working-directory: deployments
        run: sha256sum *.tar.gz > sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            deployments/*.tar.gz
            deployments/sha256sums.txt
